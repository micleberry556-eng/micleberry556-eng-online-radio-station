<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ site_settings.get('site_title', 'Онлайн Радио') }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        :root {
            --bg: {{ active_theme['bg'] }};
            --bg-card: {{ active_theme['bg-card'] }};
            --primary: {{ active_theme['primary'] }};
            --primary-glow: {{ active_theme['primary'] }}4d;
            --primary-hover: {{ active_theme['primary'] }};
            --accent: {{ active_theme['accent'] }};
            --text: {{ active_theme['text'] }};
        }
        {% if site_settings.get('background_image') %}
        body {
            background-image: url("{{ url_for('static', filename='uploads/' + site_settings['background_image']) }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }
        {% endif %}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="{{ url_for('public.index') }}" class="logo">&#9836; {{ site_settings.get('site_title', 'Онлайн Радио') }}</a>

            <!-- Burger button (mobile only) -->
            <button class="burger" id="burger-btn" aria-label="Меню">
                <span></span><span></span><span></span>
            </button>

            <nav class="header-nav" id="header-nav">
                <a href="{{ url_for('public.index') }}" class="nav-link {% if request.endpoint == 'public.index' %}nav-active{% endif %}">Станции</a>
                {% for pg in nav_pages %}
                <a href="{{ url_for('public.page', slug=pg.slug) }}" class="nav-link {% if request.endpoint == 'public.page' and request.view_args.get('slug') == pg.slug %}nav-active{% endif %}">{{ pg.title }}</a>
                {% endfor %}
                <a href="{{ url_for('auth.login') }}" class="nav-link nav-admin">Админ</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Persistent player bar at the bottom -->
    <div class="player-bar" id="player-bar" style="display:none;">
        <div class="player-inner">
            <div class="player-info">
                <div class="player-station" id="player-station-name">—</div>
                <div class="player-track" id="player-track-info">Выберите станцию</div>
            </div>
            <div class="player-controls">
                <button class="player-btn" id="btn-play" title="Играть">&#9654;</button>
                <button class="player-btn" id="btn-stop" title="Стоп" style="display:none;">&#9632;</button>
            </div>
            <div class="player-volume">
                <span class="volume-icon" id="volume-icon">&#128266;</span>
                <input type="range" id="volume-slider" min="0" max="100" value="80" class="volume-range">
                <span class="volume-value" id="volume-value">80%</span>
            </div>
            <div class="player-listeners">
                <span id="listener-count">0</span> &#128101;
            </div>
        </div>
    </div>

    <audio id="radio-audio" preload="none"></audio>

    <script src="{{ url_for('static', filename='js/player.js') }}"></script>
    <script>
    (function(){
        var btn = document.getElementById('burger-btn');
        var nav = document.getElementById('header-nav');
        if (!btn || !nav) return;
        btn.addEventListener('click', function() {
            nav.classList.toggle('nav-open');
            btn.classList.toggle('burger-open');
        });
        // Close menu when a link is clicked
        nav.querySelectorAll('.nav-link').forEach(function(link) {
            link.addEventListener('click', function() {
                nav.classList.remove('nav-open');
                btn.classList.remove('burger-open');
            });
        });
    })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
