{% extends "admin/base.html" %}
{% block title %}{{ 'Редактировать' if page else 'Создать' }} страницу{% endblock %}

{% block content %}
<div class="page-header">
    <h1>{{ 'Редактировать' if page else 'Создать' }} страницу</h1>
    <a href="{{ url_for('admin.pages_list') }}" class="btn btn-outline">Назад</a>
</div>

<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="title">Название *</label>
        <input type="text" id="title" name="title" required value="{{ page.title if page else '' }}" placeholder="Топ чарт">
    </div>

    <div class="form-group">
        <label for="slug">Slug (URL) *</label>
        <input type="text" id="slug" name="slug" required value="{{ page.slug if page else '' }}" placeholder="top-chart" pattern="[a-z0-9\-]+">
        <small>Только латинские буквы, цифры и дефис</small>
    </div>

    <div class="form-row">
        <div class="form-group">
            <label for="page_type">Тип страницы</label>
            <select id="page_type" name="page_type">
                {% for val, label in page_types %}
                <option value="{{ val }}" {% if page and page.page_type == val %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="sort_order">Порядок сортировки</label>
            <input type="number" id="sort_order" name="sort_order" value="{{ page.sort_order if page else 0 }}">
        </div>
    </div>

    <div class="form-group">
        <label for="content">Содержимое</label>
        <textarea id="content" name="content" rows="12" placeholder="HTML-содержимое страницы">{{ page.content if page else '' }}</textarea>
        <small>Поддерживается HTML-разметка</small>
    </div>

    <div class="form-group">
        <label class="checkbox-label">
            <input type="checkbox" name="is_active" {% if not page or page.is_active %}checked{% endif %}>
            Страница активна
        </label>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">{{ 'Сохранить' if page else 'Создать' }}</button>
        <a href="{{ url_for('admin.pages_list') }}" class="btn btn-outline">Отмена</a>
    </div>
</form>
{% endblock %}
