{% extends "admin/base.html" %}
{% block title %}Сменить пароль{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Сменить пароль: {{ user.username }}</h1>
    <a href="{{ url_for('admin.users_list') }}" class="btn btn-outline">Назад</a>
</div>

<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="password">Новый пароль *</label>
        <input type="password" id="password" name="password" required placeholder="Новый пароль">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="{{ url_for('admin.users_list') }}" class="btn btn-outline">Отмена</a>
    </div>
</form>
{% endblock %}
