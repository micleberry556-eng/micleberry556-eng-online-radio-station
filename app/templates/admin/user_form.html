{% extends "admin/base.html" %}
{% block title %}Добавить пользователя{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Добавить пользователя</h1>
    <a href="{{ url_for('admin.users_list') }}" class="btn btn-outline">Назад</a>
</div>

<form method="POST" class="form-card">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
        <label for="username">Имя пользователя *</label>
        <input type="text" id="username" name="username" required placeholder="admin2">
    </div>

    <div class="form-group">
        <label for="password">Пароль *</label>
        <input type="password" id="password" name="password" required placeholder="Надёжный пароль">
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary">Создать</button>
        <a href="{{ url_for('admin.users_list') }}" class="btn btn-outline">Отмена</a>
    </div>
</form>
{% endblock %}
